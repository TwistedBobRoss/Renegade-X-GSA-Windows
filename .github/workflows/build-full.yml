name: Build Renegade X Core 20 Windows Image

on:
  workflow_dispatch:
    inputs:
      payload_release:
        description: "GitHub release containing renx-core20-payload.zip parts"
        required: true
        default: "renx-core20-1.0.1022-r1"
      image_tag:
        description: "Full container image tag to publish"
        required: true
        default: "1.0.1022-core20-ltsc2022-r10"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Windows Docker daemon
        shell: powershell
        run: |
          $service = Get-Service -Name docker -ErrorAction Stop
          if ($service.Status -ne "Running") {
            Start-Service -Name docker
          }

          $deadline = (Get-Date).AddMinutes(3)
          do {
            docker info *> $null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker daemon is ready."
              break
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)

          if ($LASTEXITCODE -ne 0) {
            throw "Docker daemon did not become ready within three minutes."
          }

      - name: Download core payload parts
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $download = Join-Path $env:RUNNER_TEMP "renx-core-parts"
          New-Item -ItemType Directory -Force -Path $download | Out-Null
          gh release download "${{ inputs.payload_release }}" `
            --repo "${{ github.repository }}" `
            --pattern "renx-core20-payload.zip.*" `
            --dir $download

          $parts = @(Get-ChildItem $download -Filter "renx-core20-payload.zip.*" -File |
            Where-Object { $_.Name -match '\.\d+$' } |
            Sort-Object Name)
          if ($parts.Count -lt 1) {
            throw "No core payload parts were downloaded."
          }

          $zip = Join-Path $env:RUNNER_TEMP "renx-core20-payload.zip"
          $output = [System.IO.File]::Create($zip)
          try {
            foreach ($part in $parts) {
              Write-Host "Appending $($part.Name)"
              $input = [System.IO.File]::OpenRead($part.FullName)
              try {
                $input.CopyTo($output)
              }
              finally {
                $input.Dispose()
              }
            }
          }
          finally {
            $output.Dispose()
          }

          New-Item -ItemType Directory -Force -Path payload-runtime | Out-Null
          Expand-Archive -LiteralPath $zip -DestinationPath payload-runtime -Force
          Remove-Item -LiteralPath $download, $zip -Recurse -Force

          if (-not (Test-Path payload-runtime/Binaries/Win64/UDK.exe)) {
            throw "Extracted core payload is missing UDK.exe."
          }
          $maps = @(Get-ChildItem payload-runtime/UDKGame/CookedPC/Maps/RenX -Filter "*.udk" -File)
          if ($maps.Count -ne 20) {
            throw "Expected 20 core map files, found $($maps.Count)."
          }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build full core image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:${{ inputs.image_tag }}"
          docker build -f Dockerfile.full -t $image .

      - name: Smoke test Renegade X startup
        timeout-minutes: 8
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:${{ inputs.image_tag }}"
          $name = "renx-core20-smoke"

          $existing = docker ps -aq --filter "name=^/${name}$"
          if ($existing) {
            docker rm -f $name | Out-Null
          }
          docker run -d --name $name `
            -e RENX_SERVER_NAME="Core 20 Smoke Test" `
            -e RENX_MAP="CNC-Field" `
            -e RENX_MAX_PLAYERS="2" `
            -e RENX_GAME_PORT="7777" `
            -e RENX_PEER_PORT="7778" `
            -e RENX_QUERY_PORT="27015" `
            -e RENX_RCON_PORT="37015" `
            -e RENX_WEB_PORT="6969" `
            -e RENX_LISTED="false" `
            -e RENX_MARATHON_MODE="true" `
            $image | Out-Null

          try {
            $logPath = "C:\renx-data\Logs\RenegadeXServer.log"
            $deadline = (Get-Date).AddMinutes(4)
            $logReady = $false
            do {
              Start-Sleep -Seconds 5
              $state = docker inspect $name | ConvertFrom-Json
              if (-not $state[0].State.Running) {
                docker logs --tail 200 $name
                throw "Renegade X smoke-test container exited with code $($state[0].State.ExitCode)."
              }

              docker exec $name powershell -NoProfile -Command "if (-not (Test-Path -LiteralPath '$logPath')) { exit 1 }; `$content = Get-Content -Raw -LiteralPath '$logPath'; if (`$content -match 'Game engine initialized|MAP Loaded') { exit 0 }; exit 1"
              $logReady = $LASTEXITCODE -eq 0
            } while (-not $logReady -and (Get-Date) -lt $deadline)

            if (-not $logReady) {
              docker exec $name powershell -NoProfile -Command "if (Test-Path -LiteralPath '$logPath') { Get-Content -LiteralPath '$logPath' -Tail 100 }"
              throw "Renegade X did not reach map/game-engine initialization within four minutes."
            }

            $gameLog = docker exec $name powershell -NoProfile -Command "Get-Content -Raw -LiteralPath '$logPath'" | Out-String
            Write-Host $gameLog
            $runtimeName = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\UDKGame.ini' -Pattern '^ServerName=(.*)$').Matches.Groups[1].Value" | Out-String
            $defaultName = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\DefaultGame.ini' -Pattern '^ServerName=(.*)$').Matches.Groups[1].Value" | Out-String
            $runtimeName = $runtimeName.Trim()
            $defaultName = $defaultName.Trim()

            if ($runtimeName -ne "Core 20 Smoke Test" -or $defaultName -ne "Core 20 Smoke Test") {
              throw "Renegade X INI identity check failed. Runtime='$runtimeName'; Default='$defaultName'."
            }

            $runtimeTimeLimit = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\UDKRenegadeX.ini' -Pattern '^TimeLimit=(.*)$').Matches.Groups[1].Value" | Out-String
            $runtimeCncTimeLimit = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\UDKRenegadeX.ini' -Pattern '^CnCModeTimeLimit=(.*)$').Matches.Groups[1].Value" | Out-String
            $defaultTimeLimit = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\DefaultRenegadeX.ini' -Pattern '^TimeLimit=(.*)$').Matches.Groups[1].Value" | Out-String
            $defaultCncTimeLimit = docker exec $name powershell -NoProfile -Command "(Select-String -LiteralPath 'C:\renx-data\ServerFiles\UDKGame\Config\DefaultRenegadeX.ini' -Pattern '^CnCModeTimeLimit=(.*)$').Matches.Groups[1].Value" | Out-String
            $runtimeTimeLimit = $runtimeTimeLimit.Trim()
            $runtimeCncTimeLimit = $runtimeCncTimeLimit.Trim()
            $defaultTimeLimit = $defaultTimeLimit.Trim()
            $defaultCncTimeLimit = $defaultCncTimeLimit.Trim()

            if ($runtimeTimeLimit -ne "0" -or $runtimeCncTimeLimit -ne "0" -or $defaultTimeLimit -ne "0" -or $defaultCncTimeLimit -ne "0") {
              throw "Renegade X marathon INI check failed. Runtime='$runtimeTimeLimit/$runtimeCncTimeLimit'; Default='$defaultTimeLimit/$defaultCncTimeLimit'."
            }

            if (
              $gameLog -notmatch "bIsLanMatch=false" -or
              $gameLog -notmatch "-port=7777" -or
              $gameLog -notmatch "-QueryPort=27015" -or
              $gameLog -notmatch "-ini:UDKEngine:HardwareSurvey.LastSurveyVersion=12791" -or
              $gameLog -match "-ini:UDKGame:Engine.GameReplicationInfo.ServerName="
            ) {
              throw "Renegade X game log did not confirm internet mode, assigned ports, and the headless hardware-survey override, or still contains the unsafe command-line server-name override."
            }
          }
          finally {
            docker rm -f $name | Out-Null
          }

      - name: Push full core image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:${{ inputs.image_tag }}"
          docker push $image
