name: Build Renegade X Bootstrap Windows Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Start.ps1
      - LaunchRenegadeXServer.bat
      - blueprints/renegade-x-gsa-windows.json
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish"
        required: true
        default: "1.0.1022-ltsc2022-r5"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: windows-2022
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || '1.0.1022-ltsc2022-r5' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Windows Docker daemon
        shell: powershell
        run: |
          $service = Get-Service -Name docker -ErrorAction Stop
          if ($service.Status -ne "Running") {
            Start-Service -Name docker
          }

          $deadline = (Get-Date).AddMinutes(3)
          do {
            docker info *> $null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker daemon is ready."
              break
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)

          if ($LASTEXITCODE -ne 0) {
            throw "Docker daemon did not become ready within three minutes."
          }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:$env:IMAGE_TAG"
          docker build -t $image .

      - name: Push bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:$env:IMAGE_TAG"
          docker push $image
