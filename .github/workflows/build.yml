name: Build Renegade X Bootstrap Windows Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish"
        required: true
        default: "1.0.1022-ltsc2022-r3"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLower()
          $image = "ghcr.io/$repo:${{ inputs.image_tag }}"
          docker build -t $image .

      - name: Push bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLower()
          $image = "ghcr.io/$repo:${{ inputs.image_tag }}"
          docker push $image
