name: Build Renegade X Bootstrap Windows Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Start.ps1
      - LaunchRenegadeXServer.bat
      - blueprints/renegade-x-gsa-windows.json
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish"
        required: true
        default: "1.0.1022-ltsc2022-r4"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: windows-2022
    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag || '1.0.1022-ltsc2022-r4' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:$env:IMAGE_TAG"
          docker build -t $image .

      - name: Push bootstrap Windows container image
        shell: powershell
        run: |
          $repo = "${{ github.repository }}".ToLowerInvariant()
          $image = "ghcr.io/${repo}:$env:IMAGE_TAG"
          docker push $image
