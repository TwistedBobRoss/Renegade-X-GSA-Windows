name: Diagnose Renegade X Public Listing

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: Public server IP to find
        required: true
        default: "162.251.120.105"
      server_name:
        description: Server-name text to find
        required: false
        default: "Twisted Renegade X"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Query official master list
        env:
          SERVER_IP: ${{ inputs.server_ip }}
          SERVER_NAME: ${{ inputs.server_name }}
        shell: python
        run: |
          import json
          import os
          import socket
          import urllib.request

          master_url = "https://serverlist-rx.totemarts.services/servers.jsp?id=launcher"
          server_ip = os.environ["SERVER_IP"].strip()
          server_name = os.environ.get("SERVER_NAME", "").strip().casefold()

          print(f"Fetching {master_url}")
          request = urllib.request.Request(master_url, headers={"User-Agent": "RenX-Game"})
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = response.read().decode("utf-8")
              print(f"Master-list HTTP status: {response.status}")

          servers = json.loads(payload)
          print(f"Master-list server count: {len(servers)}")

          matches = []
          for server in servers:
              listed_ip = str(server.get("IP", "")).strip()
              listed_name = str(server.get("Name", "")).strip()
              if listed_ip == server_ip or (server_name and server_name in listed_name.casefold()):
                  matches.append(server)

          if matches:
              print("MATCHES FOUND:")
              print(json.dumps(matches, indent=2, sort_keys=True))
          else:
              print(f"NO MATCH for IP={server_ip!r} or name text={server_name!r}")

          for host, port in [
              ("devbot-rx.totemarts.services", 21337),
              ("serverlist-rx.totemarts.services", 443),
              ("statsapi.renegadexserver.com", 443),
          ]:
              try:
                  address = socket.gethostbyname(host)
                  with socket.create_connection((host, port), timeout=10):
                      print(f"TCP OK: {host}:{port} ({address})")
              except Exception as exc:
                  print(f"TCP FAILED: {host}:{port}: {exc}")
